name: Publish My Site

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 关键：显式授予写权限
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整提交历史

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material

      - name: Build MkDocs Site
        run: mkdocs build  # 先构建静态文件到 site 目录

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4  # 用成熟的部署 Action 替代 mkdocs gh-deploy
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}  # 自动生成的令牌，带写权限
          publish_dir: ./site  # 指向 mkdocs build 生成的静态文件目录
          publish_branch: gh-pages  # 部署到 gh-pages 分支
          force_orphan: true  # 强制更新分支